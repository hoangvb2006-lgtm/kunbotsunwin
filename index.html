<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô Phỏng Tài Xỉu - Đọc Kết Quả</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@500;700;900&display=swap');

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Roboto', sans-serif;
            color: #fff;
        }

        .game-board {
            background: linear-gradient(180deg, #3a0006 0%, #1a0002 100%);
            border: 3px solid #d4af37;
            border-radius: 20px;
            width: 700px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3), inset 0 0 15px #000;
            position: relative;
        }

        .header-title {
            background: linear-gradient(90deg, #b8860b, #ffd700, #b8860b);
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
        }

        .session-info {
            text-align: center;
            color: #fff;
            font-size: 16px;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .main-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }

        .side-text {
            font-size: 60px;
            font-weight: 900;
            color: #1a0002;
            -webkit-text-stroke: 1px #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            letter-spacing: 5px;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        .side-text.active {
            color: #ffd700;
            -webkit-text-stroke: 0;
            text-shadow: 0 0 20px #ffd700;
            opacity: 1;
            transform: scale(1.1);
        }

        .dice-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 30px;
            font-weight: bold;
            color: #d4af37;
        }

        .dice {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #e60000, #990000);
            border-radius: 10px;
            display: grid;
            grid-template-areas:
                "a . c"
                "d e f"
                "g . i";
            padding: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 5px 10px rgba(0,0,0,0.8);
            border: 1px solid #ff4d4d;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.4);
            display: none;
        }

        .total-score {
            font-size: 55px;
            font-weight: 900;
            color: #ffd700;
            margin-left: 10px;
            text-shadow: 0 2px 5px #000;
        }

        .action-area {
            text-align: center;
            margin-top: 40px;
        }

        button {
            background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%);
            color: #2b0000;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: 900;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            transition: all 0.2s;
            border: 2px solid #fff;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.6);
        }

        button:active {
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <div class="game-board">
        <div class="header-title">Thống Kê Phiên</div>
        <div class="session-info">#3175366 (15-07-2026)</div>

        <div class="main-display">
            <div class="side-text" id="textTai">TÀY</div>
            
            <div class="dice-container">
                <div class="dice" id="dice1">
                    <div class="dot" style="grid-area: a;"></div>
                    <div class="dot" style="grid-area: c;"></div>
                    <div class="dot" style="grid-area: d;"></div>
                    <div class="dot" style="grid-area: e;"></div>
                    <div class="dot" style="grid-area: f;"></div>
                    <div class="dot" style="grid-area: g;"></div>
                    <div class="dot" style="grid-area: i;"></div>
                </div>
                <span>+</span>
                <div class="dice" id="dice2">
                    <div class="dot" style="grid-area: a;"></div>
                    <div class="dot" style="grid-area: c;"></div>
                    <div class="dot" style="grid-area: d;"></div>
                    <div class="dot" style="grid-area: e;"></div>
                    <div class="dot" style="grid-area: f;"></div>
                    <div class="dot" style="grid-area: g;"></div>
                    <div class="dot" style="grid-area: i;"></div>
                </div>
                <span>+</span>
                <div class="dice" id="dice3">
                    <div class="dot" style="grid-area: a;"></div>
                    <div class="dot" style="grid-area: c;"></div>
                    <div class="dot" style="grid-area: d;"></div>
                    <div class="dot" style="grid-area: e;"></div>
                    <div class="dot" style="grid-area: f;"></div>
                    <div class="dot" style="grid-area: g;"></div>
                    <div class="dot" style="grid-area: i;"></div>
                </div>
                <span>=</span>
                <div class="total-score" id="totalScore">?</div>
            </div>

            <div class="side-text" id="textXiu">XẺO</div>
        </div>

        <div class="action-area">
            <button onclick="rollAndSpeak()">Random & Đọc Đáp Án</button>
        </div>
    </div>

    <script>
        // Mảng cấu hình hiển thị các chấm trên xúc xắc
        const diceFaces = {
            1: ['e'],
            2: ['a', 'i'],
            3: ['a', 'e', 'i'],
            4: ['a', 'c', 'g', 'i'],
            5: ['a', 'c', 'e', 'g', 'i'],
            6: ['a', 'c', 'd', 'f', 'g', 'i']
        };

        function drawDice(diceElementId, number) {
            const dice = document.getElementById(diceElementId);
            const dots = dice.getElementsByClassName('dot');
            
            // Ẩn tất cả chấm
            for(let dot of dots) {
                dot.style.display = 'none';
            }

            // Hiển thị chấm theo cấu hình
            const activeDots = diceFaces[number];
            for(let dot of dots) {
                if (activeDots.includes(dot.style.gridArea)) {
                    dot.style.display = 'block';
                }
            }
        }

        function rollAndSpeak() {
            // Tắt hiệu ứng nháy sáng cũ
            document.getElementById('textTai').classList.remove('active');
            document.getElementById('textXiu').classList.remove('active');

            // Random 3 viên xúc xắc
            const v1 = Math.floor(Math.random() * 6) + 1;
            const v2 = Math.floor(Math.random() * 6) + 1;
            const v3 = Math.floor(Math.random() * 6) + 1;
            
            const total = v1 + v2 + v3;
            let resultText = "";

            // Vẽ xúc xắc
            drawDice('dice1', v1);
            drawDice('dice2', v2);
            drawDice('dice3', v3);
            
            // Hiển thị tổng
            document.getElementById('totalScore').innerText = total;

            // Xác định Tài/Xỉu và bật hiệu ứng
            if (total >= 3 && total <= 10) {
                resultText = "Xỉu";
                document.getElementById('textXiu').classList.add('active');
            } else {
                resultText = "Tài";
                document.getElementById('textTai').classList.add('active');
            }

            // Phát âm thanh đọc đáp án
            speakText(`Tổng ${total} điểm. ${resultText}`);
        }

        function speakText(text) {
            // Hủy các giọng đọc đang chờ để không bị đè âm
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'vi-VN'; // Set ngôn ngữ tiếng Việt
            utterance.rate = 1.0; // Tốc độ đọc
            utterance.pitch = 1.0; // Cao độ
            
            window.speechSynthesis.speak(utterance);
        }

        // Vẽ mặc định lúc đầu (như trong ảnh là 1 - 5 - 5 = 11)
        drawDice('dice1', 1);
        drawDice('dice2', 5);
        drawDice('dice3', 5);
        document.getElementById('totalScore').innerText = "11";
        document.getElementById('textTai').classList.add('active');
    </script>
</body>
</html>
