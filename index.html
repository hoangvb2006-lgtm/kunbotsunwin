<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mô Phỏng Xúc Xắc Boardgame</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@500;700;900&display=swap');

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Roboto', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .game-board {
            background: linear-gradient(180deg, #1e1e1e 0%, #0d0d0d 100%);
            border: 2px solid #555;
            border-radius: 16px;
            width: 95%;
            max-width: 450px;
            padding: 20px 10px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1), inset 0 0 20px #000;
            position: relative;
        }

        .header-title {
            background: linear-gradient(90deg, #ccc, #fff, #ccc);
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            font-size: 22px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .session-info {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .main-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 5px 0;
        }

        .dice-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            border-radius: 15px;
            border: 1px solid #333;
        }

        .dice {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #e0e0e0, #999);
            border-radius: 10px;
            display: grid;
            grid-template-areas:
                "a . c"
                "d e f"
                "g . i";
            padding: 6px;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.4), 0 4px 8px rgba(0,0,0,0.8);
            border: 1px solid #fff;
            transition: transform 0.1s;
        }

        .dot {
            width: 9px;
            height: 9px;
            background-color: #111;
            border-radius: 50%;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.8);
            display: none;
        }

        .result-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 15px;
        }

        .side-text {
            font-size: 32px;
            font-weight: 900;
            color: #222;
            -webkit-text-stroke: 1px #555;
            letter-spacing: 2px;
            opacity: 0.5;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .side-text.active {
            color: #4ade80;
            -webkit-text-stroke: 0;
            text-shadow: 0 0 15px rgba(74, 222, 128, 0.6);
            opacity: 1;
            transform: scale(1.2);
        }
        
        #textTai.active {
            color: #f87171;
            text-shadow: 0 0 15px rgba(248, 113, 113, 0.6);
        }

        .total-score {
            font-size: 40px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 10px;
            border: 1px solid #555;
        }

        .probability-container {
            width: 90%;
            margin: 10px auto 0;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
        }

        .prob-text-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .prob-cao { color: #f87171; }
        .prob-thap { color: #4ade80; }

        .prob-bar-wrapper {
            width: 100%;
            height: 8px;
            background: #222;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
        }

        .prob-bar-cao {
            height: 100%;
            background: linear-gradient(90deg, #b91c1c, #f87171);
            transition: width 0.5s ease-in-out;
        }

        .prob-bar-thap {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #15803d);
            transition: width 0.5s ease-in-out;
        }

        .action-area {
            text-align: center;
            margin-top: 20px;
        }

        button {
            background: linear-gradient(180deg, #e2e8f0 0%, #94a3b8 100%);
            color: #0f172a;
            border: none;
            padding: 16px 30px;
            font-size: 18px;
            font-weight: 900;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 6px 15px rgba(255, 255, 255, 0.1);
            width: 90%;
            transition: all 0.1s;
            border: 2px solid #fff;
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(255, 255, 255, 0.2);
        }

        button:disabled {
            background: linear-gradient(180deg, #333, #222);
            color: #666;
            border-color: #444;
            box-shadow: none;
            pointer-events: none;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-5deg); }
            20% { transform: translate(-3px, 0px) rotate(5deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(5deg); }
            50% { transform: translate(-1px, 2px) rotate(-5deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-5deg); }
            80% { transform: translate(-1px, -1px) rotate(5deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-5deg); }
        }

        .shaking {
            animation: shake 0.4s infinite;
        }
    </style>
</head>
<body>

    <div class="game-board">
        <div class="header-title">Lượt Gieo</div>
        <div class="session-info" id="sessionInfo">Đang tải...</div>

        <div class="main-display">
            <div class="dice-wrapper">
                <div class="dice" id="dice1">
                    <div class="dot" style="grid-area: a;"></div>
                    <div class="dot" style="grid-area: c;"></div>
                    <div class="dot" style="grid-area: d;"></div>
                    <div class="dot" style="grid-area: e;"></div>
                    <div class="dot" style="grid-area: f;"></div>
                    <div class="dot" style="grid-area: g;"></div>
                    <div class="dot" style="grid-area: i;"></div>
                </div>
                <div class="dice" id="dice2">
                    <div class="dot" style="grid-area: a;"></div>
                    <div class="dot" style="grid-area: c;"></div>
                    <div class="dot" style="grid-area: d;"></div>
                    <div class="dot" style="grid-area: e;"></div>
                    <div class="dot" style="grid-area: f;"></div>
                    <div class="dot" style="grid-area: g;"></div>
                    <div class="dot" style="grid-area: i;"></div>
                </div>
                <div class="dice" id="dice3">
                    <div class="dot" style="grid-area: a;"></div>
                    <div class="dot" style="grid-area: c;"></div>
                    <div class="dot" style="grid-area: d;"></div>
                    <div class="dot" style="grid-area: e;"></div>
                    <div class="dot" style="grid-area: f;"></div>
                    <div class="dot" style="grid-area: g;"></div>
                    <div class="dot" style="grid-area: i;"></div>
                </div>
            </div>

            <div class="result-container">
                <div class="side-text" id="textTai">CAO</div>
                <div class="total-score" id="totalScore">?</div>
                <div class="side-text" id="textXiu">THẤP</div>
            </div>
        </div>

        <div class="probability-container">
            <div class="prob-text-row">
                <span class="prob-cao" id="textProbCao">CAO: 50%</span>
                <span style="color: #666; font-size: 12px;">DỰ ĐOÁN LƯỢT TỚI</span>
                <span class="prob-thap" id="textProbThap">THẤP: 50%</span>
            </div>
            <div class="prob-bar-wrapper">
                <div class="prob-bar-cao" id="barCao" style="width: 50%;"></div>
                <div class="prob-bar-thap" id="barThap" style="width: 50%;"></div>
            </div>
        </div>

        <div class="action-area">
            <button id="rollBtn" onclick="startRoll()">Gieo & Đọc Điểm</button>
        </div>
    </div>

    <script>
        // Đã thay đổi key lưu trữ thành 'boardGameSessionId_v2' để reset cache và cập nhật mốc mới
        let currentSession = localStorage.getItem('boardGameSessionId_v2');
        if (!currentSession) {
            currentSession = 3175381; // Mốc phiên mới
            localStorage.setItem('boardGameSessionId_v2', currentSession);
        } else {
            currentSession = parseInt(currentSession);
        }

        function getCurrentDate() {
            const today = new Date();
            const dd = String(today.getDate()).padStart(2, '0');
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const yyyy = today.getFullYear();
            return `${dd}-${mm}-${yyyy}`;
        }

        function updateSessionDisplay() {
            document.getElementById('sessionInfo').innerText = `#${currentSession} (${getCurrentDate()})`;
        }
        updateSessionDisplay();

        const diceFaces = {
            1: ['e'],
            2: ['a', 'i'],
            3: ['a', 'e', 'i'],
            4: ['a', 'c', 'g', 'i'],
            5: ['a', 'c', 'e', 'g', 'i'],
            6: ['a', 'c', 'd', 'f', 'g', 'i']
        };

        function drawDice(diceElementId, number) {
            const dice = document.getElementById(diceElementId);
            const dots = dice.getElementsByClassName('dot');
            for(let dot of dots) dot.style.display = 'none';
            const activeDots = diceFaces[number];
            for(let dot of dots) {
                if (activeDots.includes(dot.style.gridArea)) dot.style.display = 'block';
            }
        }

        function generateRandomProbability() {
            const percentCao = Math.floor(Math.random() * 41) + 30; 
            const percentThap = 100 - percentCao;

            document.getElementById('textProbCao').innerText = `CAO: ${percentCao}%`;
            document.getElementById('textProbThap').innerText = `THẤP: ${percentThap}%`;

            document.getElementById('barCao').style.width = `${percentCao}%`;
            document.getElementById('barThap').style.width = `${percentThap}%`;
        }

        function startRoll() {
            const btn = document.getElementById('rollBtn');
            btn.disabled = true; 
            
            currentSession++;
            // Cập nhật key mới khi bấm nút
            localStorage.setItem('boardGameSessionId_v2', currentSession);
            updateSessionDisplay();

            document.getElementById('textTai').classList.remove('active');
            document.getElementById('textXiu').classList.remove('active');
            document.getElementById('totalScore').innerText = "?";

            const dices = [document.getElementById('dice1'), document.getElementById('dice2'), document.getElementById('dice3')];
            dices.forEach(d => d.classList.add('shaking'));

            setTimeout(() => {
                dices.forEach(d => d.classList.remove('shaking'));
                finishRoll();
                btn.disabled = false;
            }, 600);
        }

        function finishRoll() {
            const v1 = Math.floor(Math.random() * 6) + 1;
            const v2 = Math.floor(Math.random() * 6) + 1;
            const v3 = Math.floor(Math.random() * 6) + 1;
            const total = v1 + v2 + v3;
            let resultText = "";

            drawDice('dice1', v1);
            drawDice('dice2', v2);
            drawDice('dice3', v3);
            
            document.getElementById('totalScore').innerText = total;

            if (total >= 3 && total <= 10) {
                resultText = "Thấp";
                document.getElementById('textXiu').classList.add('active');
            } else {
                resultText = "Cao";
                document.getElementById('textTai').classList.add('active');
            }

            speakText(`Tổng ${total}. ${resultText}`);
            
            generateRandomProbability();
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'vi-VN'; 
            utterance.rate = 1.0; 
            utterance.pitch = 1.1; 
            window.speechSynthesis.speak(utterance);
        }

        drawDice('dice1', 4);
        drawDice('dice2', 2);
        drawDice('dice3', 1);
        document.getElementById('totalScore').innerText = "7";
        document.getElementById('textXiu').classList.add('active');
        generateRandomProbability();
    </script>
</body>
</html>
